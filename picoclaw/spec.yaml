schemaVersion: "1"
kind: sandbox
name: picoclaw
displayName: PicoClaw
description: "Tiny, fast personal AI assistant (Go, single static binary) — agent CLI plus a channel gateway. Installs in seconds from the pinned upstream release; no custom image needed."

sandbox:
  image: "docker/sandbox-templates:shell"
  entrypoint:
    run: ["/home/agent/.local/bin/picoclaw-start"]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    claude.ai: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    # pinned release download at install time
    - "github.com:443"
    - "objects.githubusercontent.com:443"
    - "release-assets.githubusercontent.com:443"
    # chat platforms (enabled via config; tokens supplied by the user)
    - "*.telegram.org"
    - "*.discord.com"
    - gateway.discord.gg
    - "*.whatsapp.com"
    - "*.whatsapp.net"
    - "*.slack.com"
  publishedPorts:
    - container: 18790
      name: gateway
    - container: 18791
      name: webhook

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY

environment:
  variables:
    PICOCLAW_HOME: /home/agent/.picoclaw
    PICOCLAW_GATEWAY_HOST: "0.0.0.0"
  proxyManaged:
    - ANTHROPIC_API_KEY

commands:
  install:
    # Single static binary, ~10MB — a pinned release download is faster and
    # lighter than maintaining a pre-baked image (see
    # docs/recipe-prebaked-image-kit.md for when an image IS worth it).
    - command: "set -e; v=v0.2.9; case \"$(uname -m)\" in x86_64) a=x86_64;; aarch64|arm64) a=arm64;; *) echo \"unsupported arch\"; exit 1;; esac; curl -fsSL \"https://github.com/sipeed/picoclaw/releases/download/$v/picoclaw_Linux_$a.tar.gz\" | tar -xz -C /usr/local/bin picoclaw && chmod 0755 /usr/local/bin/picoclaw"
      user: "0"
      description: Install the pinned picoclaw release binary
  initFiles:
    - path: /home/agent/.local/bin/picoclaw-start
      mode: "0755"
      description: Entrypoint — template the proxy-managed key into config (picoclaw reads keys from config.json, not env), start the gateway, drop into the agent CLI
      content: |
        #!/bin/sh
        PCH="$HOME/.picoclaw"
        if [ -n "$PICOCLAW_HOME" ]; then PCH="$PICOCLAW_HOME"; fi
        CFG="$PCH/config.json"
        if [ -n "$ANTHROPIC_API_KEY" ] && grep -q __ANTHROPIC_API_KEY__ "$CFG" 2>/dev/null; then
            sed -i "s/__ANTHROPIC_API_KEY__/$ANTHROPIC_API_KEY/" "$CFG"
        fi
        if ! curl -fsS -m 2 http://127.0.0.1:18790/health >/dev/null 2>&1; then
            mkdir -p "$PCH"
            setsid sh -c "/usr/local/bin/picoclaw gateway > $PCH/gateway.log 2>&1" &
        fi
        exec /usr/local/bin/picoclaw agent
  startup:
    # Template the proxy-managed key at sandbox start too, so headless
    # (gateway-only, no attach) usage works.
    - command: ["sh", "-c", "CFG=/home/agent/.picoclaw/config.json; [ -n \"$ANTHROPIC_API_KEY\" ] && grep -q __ANTHROPIC_API_KEY__ $CFG 2>/dev/null && sed -i \"s/__ANTHROPIC_API_KEY__/$ANTHROPIC_API_KEY/\" $CFG || true"]
      user: "1000"
      description: Template the proxy-managed key into config.json at sandbox start
    # Absolute paths (startup commands run with a minimal env, no $HOME);
    # health-endpoint guard (a pgrep -f guard would match its own shell's
    # command line and never start the gateway).
    - command: ["sh", "-c", "curl -fsS -m 2 http://127.0.0.1:18790/health >/dev/null 2>&1 || { mkdir -p /home/agent/.picoclaw; HOME=/home/agent setsid sh -c '/usr/local/bin/picoclaw gateway > /home/agent/.picoclaw/gateway.log 2>&1' & }"]
      user: "1000"
      description: Start the picoclaw gateway in the background (health at :18790/health)
