schemaVersion: "1"
kind: sandbox
name: openclaw
displayName: OpenClaw
description: "Personal AI assistant with multi-platform chat, skills, and gateway support. Uses a pre-baked image so sandboxes start in seconds."

sandbox:
  # Pre-baked image: Node 22, openclaw @ pinned version, Chromium for the
  # browser tool, and a minimal gateway config. Built by
  # scripts/build-image.sh.
  image: "docker.io/ealeyner/openclaw-sbx:latest"
  aiFilename: AGENTS.md
  entrypoint:
    run: ["/usr/local/bin/openclaw-start"]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    claude.ai: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    # runtime plugin installs (/plugins install, externalized channels)
    - registry.npmjs.org
    - "*.npmjs.org"
    - "clawhub.ai:443"
    # chat platforms
    - "*.telegram.org"
    - "*.discord.com"
    - gateway.discord.gg
    - "*.whatsapp.com"
    - "*.whatsapp.net"
    - "*.slack.com"
    # project domains (docs links, update notes)
    - openclaw.ai
    - docs.openclaw.ai
  publishedPorts:
    - container: 18789
      name: gateway

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY

environment:
  variables:
    OPENCLAW_STATE_DIR: /home/agent/.openclaw
    PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright
  proxyManaged:
    - ANTHROPIC_API_KEY

commands:
  startup:
    - command: ["sh", "-c", "openclaw config get gateway.mode 2>/dev/null | grep -q local || openclaw config set gateway.mode local; curl -fsS http://127.0.0.1:18789/readyz >/dev/null 2>&1 || setsid sh -c 'openclaw gateway run > /home/agent/.openclaw/gateway.log 2>&1' &"]
      user: "1000"
      description: Ensure gateway.mode=local (the kit's files/ config is injected at create over the baked one), then start the gateway in the background
