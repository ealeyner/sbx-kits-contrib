schemaVersion: "1"
kind: sandbox
name: nanoclaw
version: "2.1.11"
displayName: NanoClaw
description: "Lightweight AI assistant runtime; ships the CLI channel — chat platforms (WhatsApp, Telegram, Discord, …) add via upstream skills. Uses a pre-baked image so sandboxes start in seconds."
sourceURL: https://github.com/docker/sbx-kits-contrib

sandbox:
  # Pre-baked image: nanoclaw checkout + build, Node 22, pnpm, OneCLI CLI,
  # and the inner container images (nanoclaw-agent, OneCLI gateway,
  # postgres) as an embedded archive. Built by scripts/build-image.sh.
  image: "docker.io/ealeyner/nanoclaw-sbx:latest"
  entrypoint:
    run: ["/usr/local/bin/nanoclaw-start"]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    claude.ai: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - "downloads.claude.ai:443"
    - "claude.com:443"
    - "*.whatsapp.com"
    - "*.whatsapp.net"
    - registry.npmjs.org
    - "*.npmjs.org"
    - nanoclaw.dev
    - "github.com:443"
    - "objects.githubusercontent.com:443"
    - "onecli.sh:443"
    - "www.onecli.sh:443"
    - "api.onecli.sh:443"
    - "raw.githubusercontent.com:443"
    - "release-assets.githubusercontent.com:443"
    - "ghcr.io:443"
    - "registry-1.docker.io:443"
    - "auth.docker.io:443"
    - "production.cloudflare.docker.com:443"
    - "checkpoint.prisma.io:443"
    - "deb.debian.org:443"
    - "security.debian.org:443"
  publishedPorts:
    - container: 3000
      name: webhook
    - container: 10254
      name: onecli-dashboard
    - container: 10255
      name: onecli-gateway

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY

environment:
  variables:
    IS_SANDBOX: "1"
    NODE_NO_WARNINGS: "1"
    ONECLI_BIND_HOST: "0.0.0.0"
    ONECLI_URL: "http://127.0.0.1:10254"
    # Use the pre-baked agent image instead of nanoclaw's per-checkout
    # slug-derived tag, so the setup wizard never rebuilds it.
    CONTAINER_IMAGE: "nanoclaw-agent:latest"
    CONTAINER_IMAGE_BASE: "nanoclaw-agent"
    NO_PROXY: "localhost,127.0.0.1,::1,0.0.0.0,gateway.docker.internal"
    no_proxy: "localhost,127.0.0.1,::1,0.0.0.0,gateway.docker.internal"

commands:
  startup:
    - command: ["sh", "-c", "sudo -n chmod 666 /var/run/docker.sock 2>/dev/null || chmod 666 /var/run/docker.sock 2>/dev/null || true"]
      user: "0"
      description: Restore docker socket perms (sbx restarts the inner daemon each boot, resetting them)
    - command: ["sh", "-c", "nohup /usr/local/bin/nanoclaw-load-images > /tmp/nanoclaw-load-images.log 2>&1 &"]
      user: "1000"
      description: Seed the inner Docker daemon from the embedded image archive in the background (first boot only, ~30s)
    - command: ["sh", "-c", "[ -n \"${HTTP_PROXY:-}\" ] && npm config set proxy \"$HTTP_PROXY\" && npm config set https-proxy \"${HTTPS_PROXY:-$HTTP_PROXY}\" || true"]
      user: "1000"
      description: Point npm/pnpm at the sandbox egress proxy for runtime installs (channel adapters)

oauth:
  service: anthropic
  tokenEndpoint:
    host: platform.claude.com
    path: /v1/oauth/token
  sentinels:
    accessToken: sk-ant-oat01-proxy-managed
    refreshToken: sk-ant-ort01-proxy-managed
  credentialFile:
    path: "~/.claude/.credentials.json"
    template: '{"claudeAiOauth":{"accessToken":"{{.AccessToken}}","refreshToken":"{{.RefreshToken}}","expiresAt":{{.ExpiresAt}},"scopes":{{.ScopesJSON}}}}'
  skipIfEnv:
    - ANTHROPIC_API_KEY
